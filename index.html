<html>
<head>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
	<title>Complaint Section</title>
	<style>
	.navbar {
        display: flex !important;
        flex-direction: row !important;
        justify-content: flex-start !important;
        align-items: center !important;
        gap: 40px !important;
        padding: 10px 50px !important;
        width: 100% !important;
        background-color: #0f172a;
        border-bottom: 1px solid #1e293b;
        position: fixed;
        top: 0;
        z-index: 1000;
	}
	.logo { font-size: 28px; font-weight: bold; color: #38bdf8; margin: 0; text-decoration: none; }
	.nav-pills { display: flex !important; list-style: none; gap: 30px; margin: 0; padding: 0; }
    .nav-link { color: #38bdf8 !important; text-decoration: none; font-size: 18px; font-weight: 500; }
	</style>
</head>

<body style="background-color:#0F172A;">

    <nav class="navbar">
        <h1 class="logo">Talk<span style="color:white;">&</span>Type</h1>
        <ul class="nav nav-pills">
            <li class="nav-item"><a class="nav-link" href="https://talk-and-type.onrender.com/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="https://eesasahi10.github.io/Talk-and-Type-Instructions/">Instructions</a></li>
            <li class="nav-item"><a class="nav-link" href="https://eesasahi10.github.io/Talk-And-Type-Complaint-Section/">File Complaint</a></li>
        </ul>
    </nav>

</nav>

<div style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">

    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: white; font-weight: bold;">Fill in your issue!</h1>
        <h3 style="color: white;">Please enter your complaint below.</h3>
    </div>

    <form action="https://formspree.io/f/mykqkpan" method="POST" style="width: 100%; max-width: 500px;">
        
        <div class="mb-3">
            <label for="exampleInputname" class="form-label" style="color: white;">Name</label>
            <input type="text" class="form-control" name="name" id="exampleInputname" required>
        </div>
        
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label" style="color: white;">Email address</label>
            <input type="email" class="form-control" id="exampleInputEmail1" name="email" required>
        </div>
               
        <div class="mb-3">
            <label for="exampleInputComplain" class="form-label" style="color: white;">Describe your issue in detail</label>
            <input type="string" class="form-control" name="complain" id="exampleInputComplain" required>
        </div>

        <div class="mb-3">
            <label for="exampleInputSolution" class="form-label" style="color: white;">Explain what can we can do to fix this</label>
            <input type="string" class="form-control" name="solution" id="exampleInputSolution" required>
        </div>
        
        <div class="d-grid">
            <button type="submit" class="btn btn-primary fw-bold">Submit</button>
        </div>
	
	<p id="successMessage" class="text-success text-center mt-2 d-none">
        	<i class="fa-solid fa-check me-1"></i> Thank you! We will take this into consideration. You will get a reply on the email you have written.
    	</p>
    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const form = document.querySelector('form');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', function(event) {
        // 1. Stop the browser from leaving your app page
        event.preventDefault(); 
        
        // 2. Package up your form text inputs automatically
        const data = new FormData(form);
        
        // 3. Send the data to Formspree silently in the background
        fetch(form.action, {
            method: form.method,
            body: data,
            headers: {
                'Accept': 'application/json'
            }
        }).then(response => {
            if (response.ok) {
                // 4. Show your custom success message on your page!
                successMessage.classList.remove('d-none');
                form.reset(); // Clears out the input boxes for the next user
            } else {
                alert("Oops! There was a problem sending your form data.");
            }
        }).catch(error => {
            alert("Error connecting to the form service.");
        });
    });
</script>

</body>

</html>
